services:
  ipro-talk-backend:
    build: .
    container_name: iprotalk-backend
    volumes:
      - ./data:/app/data
      - ./msg_db:/app/msg_db
      - ./backups:/app/backups
    environment:
      - "SECRET_KEY=${SECRET_KEY:-change_me_in_production}"
      - "DATABASE_URL=sqlite:///app/data/iprotalk.db?mode=rwc"
      - "MSG_DB_PATH=/app/msg_db"
      - "RUST_LOG=poem=info,ipro_talk=info"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000/api/health" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - iprotalk-net

  ipro-talk-frontend:
    build:
      context: ./web-client
      args:
        - VITE_API_URL=/api
    container_name: iprotalk-frontend
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      ipro-talk-backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - iprotalk-net

networks:
  iprotalk-net:
    driver: bridge
