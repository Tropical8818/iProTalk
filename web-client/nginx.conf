server {
    listen 80;
    server_name localhost;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Max upload size (for file uploads)
    client_max_body_size 50m;

    # Static frontend files
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Cache static assets aggressively
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # Proxy API requests to the backend
    location /api/ {
        proxy_pass http://ipro-talk-backend:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Handle SSE specifically (disable buffering)
    location /api/messages/events {
        proxy_pass http://ipro-talk-backend:3000/api/messages/events;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # Disable buffering for SSE
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        
        # Long-lived SSE connections
        proxy_read_timeout 24h;
        proxy_send_timeout 24h;
    }

    # Health check endpoint (no auth needed)
    location /api/health {
        proxy_pass http://ipro-talk-backend:3000/api/health;
        proxy_http_version 1.1;
        access_log off;
    }

    # Proxy Swagger UI and spec
    location /docs {
        proxy_pass http://ipro-talk-backend:3000/docs;
    }
    location /spec {
        proxy_pass http://ipro-talk-backend:3000/spec;
    }
}
